<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>G-Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .page-container { max-width: 1200px; margin: 0 auto 40px auto; }
        #searchInput { width: 100%; padding: 10px 15px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 10px; }
        #searchInput:focus { border-color: #22c277; box-shadow: 0 0 8px rgba(34,194,119,0.15); outline: none; }
        .product-section { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 0px 10px rgba(0,0,0,0.1); }
        .product-section h5 { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .product-grid { display: grid; gap: 20px; grid-template-columns: repeat(2, 1fr); }
        .product-card { border: 1px solid #eee; border-radius: 10px; overflow: hidden; box-shadow: 0 0px 5px rgba(0,0,0,0.1); transition: transform 0.2s ease; cursor: pointer; background: white; color: inherit; text-decoration: none; display: block; }
        .product-card:hover { transform: translateY(-3px); }
        .product-card img { width: 100%; height: 150px; object-fit: cover; display: block; }
        .card-info { padding: 10px; }
        .product-name { font-size: 14px; font-weight: 500; margin: 0 0 4px 0; }
        .product-seller { font-size: 12px; color: #888; margin: 0 0 4px 0; }
        .product-price { font-size: 16px; font-weight: bold; color: #1c1c1e; margin: 0; }
        .mine-badge { display: inline-block; font-size: 10px; background: #22c277; color: white; border-radius: 10px; padding: 1px 7px; margin-left: 6px; font-weight: 600; vertical-align: middle; }
        .no-results { grid-column: 1/-1; text-align: center; padding: 3rem; color: #888; }
        .loading { grid-column: 1/-1; text-align: center; padding: 3rem; color: #aaa; font-style: italic; }
        .signout-btn { background: transparent; border: 1px solid #aaa; color: #ccc; padding: 5px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .signout-btn:hover { background: #dc3545; border-color: #dc3545; color: white; }
        @media (max-width: 576px) { .product-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="prototype.html">G-Market</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link" href="prototype.html">Market</a>
                <a class="nav-link" href="ProfilePrototpye.html">Profile</a>
                <a class="nav-link" href="Inbox.html">Inbox</a>
            </div>
            <div class="d-flex align-items-center gap-3">
                <span class="text-secondary" id="navUsername" style="font-size:13px;"></span>
                <button class="signout-btn" onclick="signOut()">Sign Out</button>
            </div>
        </div>
    </nav>

    <div class="page-container">
        <input type="text" id="searchInput" placeholder="Search for Items...">
        <div class="product-section">
            <h5>Browse Listings</h5>
            <div class="product-grid" id="productGrid">
                <div class="loading">Loading listings...</div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8080';
        const PLACEHOLDER = 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&q=80';
        const loggedInUser = JSON.parse(localStorage.getItem('user'));
        let allListings = [];
        let usersMap = {};

        // Show logged-in username in navbar
        if (loggedInUser) {
            document.getElementById('navUsername').textContent = '@' + loggedInUser.username;
        }

        function signOut() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${API}/users`);
                const users = await res.json();
                users.forEach(u => usersMap[u.id] = u);
            } catch (e) {}
        }

        async function loadListings() {
            const grid = document.getElementById('productGrid');
            try {
                await loadUsers();
                const response = await fetch(`${API}/listings`);
                allListings = await response.json();
                renderListings(allListings);
            } catch (err) {
                grid.innerHTML = '<div class="no-results">Could not load listings. Make sure Spring Boot is running.</div>';
            }
        }

        function renderListings(listings) {
            const grid = document.getElementById('productGrid');
            const active = listings.filter(l => !l.isSold && l.userId);

            if (!active.length) {
                grid.innerHTML = '<div class="no-results">No listings available.</div>';
                return;
            }

            grid.innerHTML = active.map(listing => {
                const seller = usersMap[listing.userId];
                const sellerDisplay = seller ? `@${seller.username}` : `User #${listing.userId}`;
                const isMyListing = loggedInUser && listing.userId === loggedInUser.id;
                // If it's the logged-in user's own listing, go to their own profile page
                const href = isMyListing
                    ? 'ProfilePrototpye.html'
                    : `ProfilePrototype2.html?userId=${listing.userId}`;

                return `
                    <a class="product-card" href="${href}">
                        <img src="${listing.imageUrl || PLACEHOLDER}" alt="${listing.title}" onerror="this.src='${PLACEHOLDER}'">
                        <div class="card-info">
                            <p class="product-name">
                                ${listing.title}
                                ${isMyListing ? '<span class="mine-badge">Mine</span>' : ''}
                            </p>
                            <p class="product-seller">${sellerDisplay}</p>
                            <p class="product-price">$${parseFloat(listing.price).toFixed(2)}</p>
                        </div>
                    </a>
                `;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('keyup', function () {
            const query = this.value.toLowerCase();
            const filtered = allListings.filter(l =>
                l.title?.toLowerCase().includes(query) ||
                (usersMap[l.userId]?.username || '').toLowerCase().includes(query)
            );
            renderListings(filtered);
        });

        loadListings();
    </script>
</body>
</html>

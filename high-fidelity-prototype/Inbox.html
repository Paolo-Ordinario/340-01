<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inbox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .inbox-container { max-width: 800px; margin: 0 auto; }
        .inbox-layout { display: flex; gap: 20px; height: 600px; }
        .conversations-panel { width: 280px; flex-shrink: 0; background: white; border-radius: 15px; box-shadow: 0 0 10px rgba(0,0,0,0.08); overflow-y: auto; }
        .conversations-panel h6 { padding: 16px; font-weight: 700; border-bottom: 1px solid #eee; margin: 0; }
        .convo-item { padding: 14px 16px; border-bottom: 1px solid #f5f5f5; cursor: pointer; transition: background 0.2s; }
        .convo-item:hover, .convo-item.active { background: #f0fff7; }
        .convo-name { font-weight: 600; font-size: 14px; }
        .convo-preview { font-size: 12px; color: #aaa; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .messages-panel { flex: 1; background: white; border-radius: 15px; box-shadow: 0 0 10px rgba(0,0,0,0.08); display: flex; flex-direction: column; }
        .messages-header { padding: 16px; border-bottom: 1px solid #eee; font-weight: 700; font-size: 15px; }
        .messages-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .message-bubble { max-width: 70%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .message-bubble.sent { background: #22c277; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message-bubble.received { background: #f0f0f0; color: #1c1c1e; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message-time { font-size: 11px; color: #bbb; margin-top: 3px; }
        .sent-wrapper { display: flex; flex-direction: column; align-items: flex-end; }
        .received-wrapper { display: flex; flex-direction: column; align-items: flex-start; }
        .sent .message-time { text-align: right; }
        .messages-input { padding: 12px 16px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .messages-input input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; outline: none; }
        .messages-input input:focus { border-color: #22c277; }
        .messages-input button { background: #22c277; color: white; border: none; border-radius: 20px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; width: auto; margin: 0; }
        .messages-input button:hover { background: rgb(48, 186, 89); }
        .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 14px; }
        .loading-text { color: #aaa; font-style: italic; font-size: 14px; padding: 16px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="Inbox.html">Inbox</a>
            <div class="navbar-nav">
                <a class="nav-link" href="prototype.html">Market</a>
                <a class="nav-link" href="ProfilePrototpye.html">Profile</a>
                <a class="nav-link" href="Inbox.html">Inbox</a>
            </div>
        </div>
    </nav>

    <div class="inbox-container">
        <div class="inbox-layout">
            <div class="conversations-panel">
                <h6>Messages</h6>
                <div id="convList">
                    <div class="loading-text">Loading...</div>
                </div>
            </div>

            <div class="messages-panel">
                <div class="messages-header" id="threadHeader">Select a conversation</div>
                <div class="messages-body" id="threadBody">
                    <div class="empty-state">No conversation selected.</div>
                </div>
                <div class="messages-input" id="replyBox" style="display:none;">
                    <input type="text" id="replyInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendReply()">
                    <button onclick="sendReply()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8080';
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) { window.location.href = 'login.html'; }

        let activePartnerId = null;
        let activePartnerName = '';
        let allMessages = [];
        let usersMap = {};

        // ─── Load Users for name lookup ───────────────────────────────
        async function loadUsers() {
            try {
                const res = await fetch(`${API}/users`);
                const users = await res.json();
                users.forEach(u => usersMap[u.id] = u);
            } catch (e) {}
        }

        function getPartnerName(partnerId) {
            return usersMap[partnerId]?.name || usersMap[partnerId]?.username || `User ${partnerId}`;
        }

        // ─── Load Conversations ───────────────────────────────────────
        async function loadConversations() {
            const convList = document.getElementById('convList');
            try {
                await loadUsers();

                const [sentRes, recvRes] = await Promise.all([
                    fetch(`${API}/messages/sender/${user.id}`),
                    fetch(`${API}/messages/receiver/${user.id}`)
                ]);
                const sent = await sentRes.json();
                const recv = await recvRes.json();
                allMessages = [...sent, ...recv].sort((a, b) =>
                    new Date(a.createdAt) - new Date(b.createdAt)
                );

                if (!allMessages.length) {
                    convList.innerHTML = '<div class="loading-text">No messages yet.</div>';
                    return;
                }

                // Group by conversation partner
                const partnerMap = {};
                allMessages.forEach(msg => {
                    const partnerId = msg.senderId === user.id ? msg.receiverId : msg.senderId;
                    partnerMap[partnerId] = {
                        id: partnerId,
                        name: getPartnerName(partnerId),
                        lastMsg: msg.content
                    };
                });

                convList.innerHTML = Object.values(partnerMap).map(p => `
                    <div class="convo-item" data-partner-id="${p.id}" data-partner-name="${p.name}" onclick="openConversation(${p.id}, '${p.name.replace(/'/g, "\\'")}', this)">
                        <div class="convo-name">${p.name}</div>
                        <div class="convo-preview">${p.lastMsg}</div>
                    </div>
                `).join('');

            } catch (e) {
                convList.innerHTML = '<div class="loading-text" style="color:#dc3545;">Could not load messages.</div>';
            }
        }

        // ─── Open Conversation ────────────────────────────────────────
        function openConversation(partnerId, partnerName, el) {
            activePartnerId = partnerId;
            activePartnerName = partnerName;

            document.querySelectorAll('.convo-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            document.getElementById('threadHeader').textContent = partnerName;
            document.getElementById('replyBox').style.display = 'flex';

            const thread = allMessages.filter(msg =>
                (msg.senderId === user.id && msg.receiverId === partnerId) ||
                (msg.senderId === partnerId && msg.receiverId === user.id)
            );

            const body = document.getElementById('threadBody');
            if (!thread.length) {
                body.innerHTML = '<div class="empty-state">No messages yet. Say hello!</div>';
                return;
            }

            body.innerHTML = thread.map(msg => {
                const isSent = msg.senderId === user.id;
                const time = msg.createdAt
                    ? new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    : '';
                return `
                    <div class="${isSent ? 'sent-wrapper' : 'received-wrapper'}">
                        <div class="message-bubble ${isSent ? 'sent' : 'received'}">${msg.content}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
            }).join('');

            body.scrollTop = body.scrollHeight;
        }

        // ─── Send Reply ───────────────────────────────────────────────
        async function sendReply() {
            const content = document.getElementById('replyInput').value.trim();
            if (!content || !activePartnerId) return;

            try {
                const res = await fetch(`${API}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        senderId: user.id,
                        receiverId: activePartnerId,
                        content
                    })
                });
                if (res.ok) {
                    document.getElementById('replyInput').value = '';
                    await loadConversations();
                    // Re-open the same conversation
                    const el = document.querySelector(`[data-partner-id="${activePartnerId}"]`);
                    if (el) openConversation(activePartnerId, activePartnerName, el);
                }
            } catch (e) {
                alert('Could not send message.');
            }
        }

        loadConversations();
    </script>
</body>
</html>

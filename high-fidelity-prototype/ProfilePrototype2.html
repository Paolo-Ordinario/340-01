<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seller Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .page-container { display: flex; gap: 40px; align-items: flex-start; margin: 0 auto 40px auto; max-width: 1200px; }
        .left-section { width: 300px; flex-shrink: 0; }
        .profile-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 0px 10px rgba(0,0,0,0.1); text-align: center; }
        .profile-card img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; }
        .profile-name { font-size: 22px; font-weight: bold; margin-top: 10px; }
        .profile-username { font-size: 14px; color: #888; margin-top: 4px; }
        .profile-description { margin-top: 10px; color: rgb(9,9,9); font-size: 14px; line-height: 1.5; }
        .reviews-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 0px 10px rgba(0,0,0,0.1); position: relative; overflow: hidden; }
        .review { opacity: 0; transform: translateX(50px); transition: all 0.5s ease; position: absolute; top: 0; left: 0; width: 100%; }
        .review-slider { position: relative; height: 80px; }
        .review.active { opacity: 1; transform: translateX(0); position: relative; }
        .review-controls { margin-top: 15px; display: flex; justify-content: space-between; gap: 15px; }
        .review-controls button { background: #22c277; color: white; width: 100px; height: 40px; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; display: flex; justify-content: center; transition: all 0.3s ease; }
        .review-controls button:hover { background-color: rgb(48, 186, 89); }
        .top-right-section { flex: 1; }
        .right-section { flex: 1; }
        .product-section { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 0px 10px rgba(0,0,0,0.1); }
        .product-grid { display: grid; gap: 20px; margin-top: 20px; grid-template-columns: repeat(2, 1fr); }
        .product-card { border: 1px solid #eee; border-radius: 10px; overflow: hidden; box-shadow: 0 0px 5px rgba(0,0,0,0.1); transition: transform 0.2s ease; cursor: pointer; }
        .product-card:hover { transform: translateY(-3px); }
        .product-card img { width: 100%; height: 150px; object-fit: cover; display: block; }
        .product-card p { padding: 10px; font-size: 14px; font-weight: 500; margin: 0; }
        button { background-color: #22c277; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%; margin-top: 10px; cursor: pointer; }
        button:hover { background-color: rgb(48, 186, 89); color: white; }
        .main-layout { display: flex; gap: 40px; align-items: flex-start; }
        .back-link { display: inline-block; margin-bottom: 16px; font-size: 14px; color: #22c277; text-decoration: none; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }
        .stat-row { display: flex; justify-content: center; gap: 24px; margin-top: 14px; padding-top: 14px; border-top: 1px solid #eee; }
        .stat { text-align: center; }
        .stat-number { font-size: 18px; font-weight: bold; color: #1c1c1e; }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .message-btn { background: #22c277; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 14px; width: 100%; }
        .message-btn:hover { background: rgb(48, 186, 89); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 999; }
        .modal-box { background: white; padding: 25px; border-radius: 15px; width: 380px; }
        .modal-box textarea, .modal-box input { width: 100%; margin-top: 10px; padding: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .modal-box button { margin-top: 10px; }
        .cancel-btn { background: #999; }
        .loading-text { color: #aaa; font-style: italic; font-size: 14px; padding: 10px; }
        .error-text { color: #dc3545; font-size: 14px; padding: 10px; }
        .signout-btn { background: transparent; border: 1px solid #aaa; color: #ccc; padding: 5px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; width: auto; margin: 0; }
        .signout-btn:hover { background: #dc3545; border-color: #dc3545; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="ProfilePrototype2.html">Seller Profile</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link" href="prototype.html">Market</a>
                <a class="nav-link" href="ProfilePrototpye.html">Profile</a>
                <a class="nav-link" href="Inbox.html">Inbox</a>
            </div>
            <div class="d-flex align-items-center gap-3">
                <span class="text-secondary" id="navUsername" style="font-size:13px;"></span>
                <button class="signout-btn" onclick="signOut()">Sign Out</button>
            </div>
        </div>
    </nav>

    <div style="max-width: 1200px; margin: 0 auto; padding: 0 20px">
        <a class="back-link" href="prototype.html">&larr; Back to Market</a>
    </div>

    <div class="page-container main-layout">
        <div class="left-section">
            <div class="profile-card">
                <img id="profileImg" src="Image/Profile_Picture.png" alt="Profile Picture">
                <div class="profile-name" id="profileName">Loading...</div>
                <div class="profile-username" id="profileUsername">@...</div>
                <div class="profile-description" id="profileBio"></div>
                <div class="stat-row">
                    <div class="stat">
                        <div class="stat-number" id="statRating">—</div>
                        <div class="stat-label">Rating</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number" id="statReviews">0</div>
                        <div class="stat-label">Reviews</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number" id="statSold">0</div>
                        <div class="stat-label">Items Sold</div>
                    </div>
                </div>
                <button class="message-btn" onclick="openMessageModal()">Message Seller</button>
            </div>
        </div>

        <div class="top-right-section">
            <div class="reviews-card">
                <h5>Reviews</h5>
                <div class="review-slider" id="reviewSlider">
                    <div class="review active loading-text">Loading reviews...</div>
                </div>
                <div class="review-controls">
                    <button onclick="prevReview()">&#8592;</button>
                    <button onclick="nextReview()">&#8594;</button>
                </div>
                <hr class="my-4">
                <h6>Leave a Review</h6>
                <input type="text" id="reviewerName" placeholder="Your Name" class="form-control mb-2" style="margin-top:8px;">
                <textarea id="reviewComment" placeholder="Your Review..." rows="3" class="form-control mb-3"></textarea>
                <div class="mb-3">
                    <label class="form-label">Rating:</label>
                    <select id="reviewRating" class="form-select">
                        <option value="5">5 - Excellent</option>
                        <option value="4">4 - Good</option>
                        <option value="3">3 - Average</option>
                        <option value="2">2 - Poor</option>
                        <option value="1">1 - Terrible</option>
                    </select>
                </div>
                <button onclick="submitReview()">Submit Review</button>
            </div>
        </div>
    </div>

    <div class="page-container">
        <div class="right-section">
            <div class="product-section">
                <h5 id="listingsTitle">Listings</h5>
                <div class="product-grid" id="productGrid">
                    <div class="loading-text">Loading listings...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Message Modal -->
    <div class="modal-overlay" id="messageModal">
        <div class="modal-box">
            <h4>Message <span id="modalSellerName">Seller</span></h4>
            <textarea id="messageText" rows="4" placeholder="Write your message..."></textarea>
            <button onclick="sendMessage()">Send Message</button>
            <button class="cancel-btn" onclick="closeMessageModal()">Cancel</button>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8080';
        const PLACEHOLDER = 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&q=80';

        const params = new URLSearchParams(window.location.search);
        const sellerId = params.get('userId');
        const loggedInUser = JSON.parse(localStorage.getItem('user'));

        // Show username in navbar
        if (loggedInUser) document.getElementById('navUsername').textContent = '@' + loggedInUser.username;

        function signOut() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // Guard: if no valid sellerId, redirect
        if (!sellerId || sellerId === 'null' || sellerId === 'undefined') {
            document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#dc3545;font-family:sans-serif;">No seller specified. <a href="prototype.html" style="color:#22c277;">Go back to Market</a></div>';
        }

        // If this is the logged-in user's own profile, redirect to their profile page
        if (loggedInUser && sellerId == loggedInUser.id) {
            window.location.href = 'ProfilePrototpye.html';
        }

        let currentReviewIndex = 0;
        let reviewElements = [];

        async function loadProfile() {
            try {
                const res = await fetch(`${API}/users/${sellerId}`);
                if (!res.ok) throw new Error();
                const u = await res.json();
                document.getElementById('profileName').textContent = u.name;
                document.getElementById('profileUsername').textContent = '@' + u.username;
                document.getElementById('profileBio').textContent = u.bio || '';
                document.getElementById('listingsTitle').textContent = `${u.name}'s Listings`;
                document.getElementById('modalSellerName').textContent = u.name;
            } catch (e) {
                document.getElementById('profileName').textContent = 'Unknown Seller';
                document.getElementById('profileUsername').textContent = '';
            }
        }

        async function loadListings() {
            const grid = document.getElementById('productGrid');
            try {
                const res = await fetch(`${API}/listings/user/${sellerId}`);
                if (!res.ok) throw new Error();
                const listings = await res.json();
                const active = listings.filter(l => !l.isSold);
                document.getElementById('statSold').textContent = listings.filter(l => l.isSold).length;

                if (!active.length) {
                    grid.innerHTML = '<p style="color:#aaa;padding:20px;">No active listings.</p>';
                    return;
                }
                grid.innerHTML = active.map(l => `
                    <div class="product-card">
                        <img src="${l.imageUrl || PLACEHOLDER}" alt="${l.title}" onerror="this.src='${PLACEHOLDER}'">
                        <p>${l.title} - $${parseFloat(l.price).toFixed(2)}</p>
                        ${l.description ? `<p style="color:#888;font-size:12px;">${l.description}</p>` : ''}
                    </div>
                `).join('');
            } catch (e) {
                grid.innerHTML = '<p class="error-text">Could not load listings.</p>';
            }
        }

        async function loadReviews() {
            const slider = document.getElementById('reviewSlider');
            try {
                const res = await fetch(`${API}/reviews/seller/${sellerId}`);
                const reviews = await res.json();

                if (!reviews.length) {
                    slider.innerHTML = '<div class="review active"><p>No reviews yet. Be the first!</p></div>';
                    reviewElements = slider.querySelectorAll('.review');
                    document.getElementById('statRating').textContent = '—';
                    document.getElementById('statReviews').textContent = '0';
                    return;
                }

                slider.innerHTML = reviews.map(r => `
                    <div class="review">
                        <p><strong>${r.reviewerName || 'Anonymous'}:</strong> ${r.content}</p>
                        <small>Rating: ${r.rating}/5</small>
                        ${r.reply ? `<p style="color:#22c277;font-size:13px;margin-top:4px;">Seller replied: ${r.reply}</p>` : ''}
                    </div>
                `).join('');

                reviewElements = slider.querySelectorAll('.review');
                reviewElements[0].classList.add('active');
                currentReviewIndex = 0;

                const avg = (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length).toFixed(1);
                document.getElementById('statRating').textContent = avg;
                document.getElementById('statReviews').textContent = reviews.length;
            } catch (e) {
                slider.innerHTML = '<div class="review active"><p class="error-text">Could not load reviews.</p></div>';
            }
        }

        function showReview(i) { reviewElements.forEach(r => r.classList.remove('active')); reviewElements[i].classList.add('active'); }
        function nextReview() { if (!reviewElements.length) return; currentReviewIndex = (currentReviewIndex + 1) % reviewElements.length; showReview(currentReviewIndex); }
        function prevReview() { if (!reviewElements.length) return; currentReviewIndex = (currentReviewIndex - 1 + reviewElements.length) % reviewElements.length; showReview(currentReviewIndex); }
        setInterval(nextReview, 10000);

        async function submitReview() {
            const reviewerName = document.getElementById('reviewerName').value.trim() || (loggedInUser?.name || 'Anonymous');
            const content = document.getElementById('reviewComment').value.trim();
            const rating = parseInt(document.getElementById('reviewRating').value);
            if (!content) { alert('Please write a review.'); return; }
            try {
                const res = await fetch(`${API}/reviews`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sellerId: parseInt(sellerId), reviewerName, content, rating })
                });
                if (res.ok) {
                    document.getElementById('reviewComment').value = '';
                    document.getElementById('reviewerName').value = '';
                    loadReviews();
                } else {
                    alert('Failed to submit review.');
                }
            } catch (e) { alert('Could not connect to server.'); }
        }

        function openMessageModal() {
            if (!loggedInUser) { window.location.href = 'login.html'; return; }
            document.getElementById('messageModal').style.display = 'flex';
        }
        function closeMessageModal() { document.getElementById('messageModal').style.display = 'none'; }

        async function sendMessage() {
            const content = document.getElementById('messageText').value.trim();
            if (!content) { alert('Please write a message.'); return; }
            if (!loggedInUser) { window.location.href = 'login.html'; return; }
            try {
                const res = await fetch(`${API}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ senderId: loggedInUser.id, receiverId: parseInt(sellerId), content })
                });
                if (res.ok) { closeMessageModal(); document.getElementById('messageText').value = ''; alert('Message sent!'); }
                else { alert('Failed to send message.'); }
            } catch (e) { alert('Could not connect to server.'); }
        }

        if (sellerId && sellerId !== 'null' && sellerId !== 'undefined') {
            loadProfile();
            loadListings();
            loadReviews();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
<style>
        body {
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .auth-container {
            max-width: 420px;
            margin: 60px auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 0px 20px rgba(0,0,0,0.1);
            padding: 40px;
        }

        .auth-title {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 6px;
            color: #1c1c1e;
        }

        .auth-subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
            display: block;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            outline: none;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: #22c277;
            box-shadow: 0 0 0 3px rgba(34, 194, 119, 0.15);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #22c277;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: rgb(48, 186, 89);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(34, 194, 119, 0.3);
        }

        .divider {
            text-align: center;
            color: #aaa;
            font-size: 13px;
            margin: 20px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #eee;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .login-link {
            text-align: center;
            font-size: 14px;
            color: #888;
        }

        .login-link a {
            color: #22c277;
            font-weight: 600;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error-msg {
            background: #fff0f0;
            color: #dc3545;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .success-msg {
            background: #f0fff7;
            color: #22c277;
            border: 1px solid #b2f0d6;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
</style>
</head>
<body>
    <nav class = "navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class = "container">
            <a class = "navbar-brand" href="Signup.html">G-Market</a>
            <div class = "navbar-nav">
                <a class = "nav-link" href="login.html">Login</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class = "auth-title">Create Account</div>
        <div class = "auth-subtitle"> Join G-Market and start buying & selling products!</div>
        <div class="error-msg" id="error-msg"></div>
        <div class="success-msg" id="success-msg"></div>

        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name">
        </div>

        <div class =" form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Choose a username">
        </div>

        <div class = "form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class = "form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="At least 6 characters">
        </div>

        <button class="submit-btn" onclick = "handleSignup()">Create Account</button>
        <div class="divider">or</div>
        <div class="login-link">Already have an account? <a href="login.html">Login here</a></div>
    </div>
<script>
    async function handleSignup() {
        const name  = document.getElementById('name').value.trim();
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');

        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        if (!name || !username || !email || !password) {
            errorMsg.textContent = 'Please fill in all fields.';
            errorMsg.style.display = 'block';
            return;
        }

        if (password.length < 6) {
            errorMsg.textContent = 'Password must be at least 6 characters.';
            errorMsg.style.display = 'block';
            return;
        }

        try {
                const response = await fetch('http://localhost:3000/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    successMsg.textContent = 'Account created! Redirecting to login...';
                    successMsg.style.display = 'block';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    errorMsg.textContent = data.error || 'Something went wrong.';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Could not connect to server. Make sure your server is running.';
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
